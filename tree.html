function createGlowTexture(
    inner = 'rgba(255,244,214,1)',
    mid = 'rgba(255,208,92,0.45)',
    outer = 'rgba(255,190,40,0)'
) {
    const size = 256;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
    g.addColorStop(0, inner);
    g.addColorStop(0.24, mid);
    g.addColorStop(1, outer);

    ctx.fillStyle = g;
    ctx.fillRect(0, 0, size, size);

    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    return tex;
}

function createEmbossedTextTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 2200;
    canvas.height = 640;
    const ctx = canvas.getContext('2d');
    const text = 'MERRY CHRISTMAS';
    const cx = canvas.width / 2;
    const cy = canvas.height / 2 + 8;

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '900 190px "Trebuchet MS", "Arial Black", sans-serif';

    // 背后厚度阴影：制造“浮雕下沉/凸起”的假深度
    ctx.lineWidth = 18;
    ctx.strokeStyle = 'rgba(76, 48, 10, 0.42)';
    ctx.strokeText(text, cx + 9, cy + 16);
    ctx.fillStyle = 'rgba(115, 76, 18, 0.30)';
    ctx.fillText(text, cx + 9, cy + 16);

    // 第二层厚度
    ctx.lineWidth = 12;
    ctx.strokeStyle = 'rgba(96, 62, 14, 0.35)';
    ctx.strokeText(text, cx + 5, cy + 9);

    // 主体金属渐变
    const metalGradient = ctx.createLinearGradient(0, 90, 0, canvas.height - 90);
    metalGradient.addColorStop(0.00, '#f7e7b2');
    metalGradient.addColorStop(0.16, '#dfbf6d');
    metalGradient.addColorStop(0.34, '#b7862d');
    metalGradient.addColorStop(0.50, '#f2d98f');
    metalGradient.addColorStop(0.67, '#b68029');
    metalGradient.addColorStop(0.86, '#d7b261');
    metalGradient.addColorStop(1.00, '#f0ddb0');
    ctx.fillStyle = metalGradient;
    ctx.fillText(text, cx, cy);

    // 主轮廓线
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(92, 60, 14, 0.42)';
    ctx.strokeText(text, cx, cy);

    // 顶部浮雕高光
    ctx.save();
    ctx.globalCompositeOperation = 'source-atop';
    const topHighlight = ctx.createLinearGradient(0, 80, 0, cy + 10);
    topHighlight.addColorStop(0, 'rgba(255,255,240,0.45)');
    topHighlight.addColorStop(0.35, 'rgba(255,250,230,0.18)');
    topHighlight.addColorStop(1, 'rgba(255,250,230,0)');
    ctx.fillStyle = topHighlight;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 底部哑光压暗
    const lowerShade = ctx.createLinearGradient(0, cy - 10, 0, canvas.height - 50);
    lowerShade.addColorStop(0, 'rgba(80,52,12,0)');
    lowerShade.addColorStop(1, 'rgba(80,52,12,0.26)');
    ctx.fillStyle = lowerShade;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 拉丝纹理
    for (let i = 0; i < 360; i++) {
        const y = 105 + Math.random() * (canvas.height - 210);
        const alpha = 0.02 + Math.random() * 0.024;
        ctx.fillStyle = `rgba(255, 247, 220, ${alpha})`;
        ctx.fillRect(270, y, canvas.width - 540, 1 + Math.random() * 1.1);
    }

    for (let i = 0; i < 140; i++) {
        const x = 270 + Math.random() * (canvas.width - 540);
        const alpha = 0.01 + Math.random() * 0.012;
        ctx.fillStyle = `rgba(112, 82, 28, ${alpha})`;
        ctx.fillRect(x, 118, 1, canvas.height - 236);
    }
    ctx.restore();

    // 左上高光描边，强化凸起感
    ctx.lineWidth = 3.5;
    ctx.strokeStyle = 'rgba(255, 247, 220, 0.30)';
    ctx.strokeText(text, cx - 1.6, cy - 2.4);

    // 右下内阴影描边
    ctx.lineWidth = 3.5;
    ctx.strokeStyle = 'rgba(92, 60, 14, 0.20)';
    ctx.strokeText(text, cx + 1.6, cy + 2.2);

    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
}

function buildBalancedPhotoTexture(image, forceBrightCompensation = false) {
    const canvas = document.createElement('canvas');
    canvas.width = image.width;
    canvas.height = image.height;
    const ctx = canvas.getContext('2d');

    ctx.drawImage(image, 0, 0);

    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = imgData.data;

    let lumSum = 0;
    const pixelCount = d.length / 4;

    for (let i = 0; i < d.length; i += 4) {
        const r = d[i] / 255;
        const g = d[i + 1] / 255;
        const b = d[i + 2] / 255;
                const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        lumSum += lum;
    }

    const avgLum = lumSum / pixelCount;

    const gain =
        forceBrightCompensation ? 0.78 :
        avgLum > 0.78 ? 0.76 :
        avgLum > 0.68 ? 0.82 :
        avgLum > 0.58 ? 0.88 : 0.94;

    for (let i = 0; i < d.length; i += 4) {
        let r = d[i] * gain;
        let g = d[i + 1] * gain;
        let b = d[i + 2] * gain;

        if (r > 210) r = 210 + (r - 210) * 0.45;
        if (g > 210) g = 210 + (g - 210) * 0.45;
        if (b > 210) b = 210 + (b - 210) * 0.45;

        d[i] = Math.max(0, Math.min(255, r));
        d[i + 1] = Math.max(0, Math.min(255, g));
        d[i + 2] = Math.max(0, Math.min(255, b));
    }

    ctx.putImageData(imgData, 0, 0);

    const tex = new THREE.CanvasTexture(canvas);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    tex.generateMipmaps = true;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.needsUpdate = true;

    return tex;
}

function createCandyStripeTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');

    // 红色底
    ctx.fillStyle = '#c6281b';
    ctx.fillRect(0, 0, 256, 256);

    // 斜向白色糖果纹
    ctx.strokeStyle = '#f8f3ea';
    ctx.lineWidth = 26;
    for (let i = -220; i < 460; i += 64) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i - 180, 256);
        ctx.stroke();
    }

    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(1, 2.2);
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
}

function lmDist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function smoothLandmarks(newLm, alpha = 0.40) {
    if (!smoothedLandmarks) {
        smoothedLandmarks = newLm.map(p => ({ x: p.x, y: p.y, z: p.z }));
        return smoothedLandmarks;
    }

    smoothedLandmarks = smoothedLandmarks.map((p, i) => ({
        x: p.x + (newLm[i].x - p.x) * alpha,
        y: p.y + (newLm[i].y - p.y) * alpha,
        z: p.z + (newLm[i].z - p.z) * alpha
    }));

    return smoothedLandmarks;
}

function getPalmScale(lm) {
    const wristToPalm = lmDist(lm[0], lm[9]);
    const palmWidth = lmDist(lm[5], lm[17]);
    return Math.max((wristToPalm + palmWidth) * 0.5, 0.001);
}

function isFingerExtended(lm, tip, pip, mcp) {
    const scale = getPalmScale(lm);
    const wrist = lm[0];

    const tipPalm = lmDist(lm[tip], wrist) / scale;
    const pipPalm = lmDist(lm[pip], wrist) / scale;
    const tipMcp = lmDist(lm[tip], lm[mcp]) / scale;

    return tipPalm > pipPalm + 0.10 && tipMcp > 0.58;
}

function isFingerCurled(lm, tip, pip, mcp) {
    const scale = getPalmScale(lm);
    const wrist = lm[0];

    const tipPalm = lmDist(lm[tip], wrist) / scale;
    const pipPalm = lmDist(lm[pip], wrist) / scale;
    const tipMcp = lmDist(lm[tip], lm[mcp]) / scale;

    return tipPalm < pipPalm + 0.03 || tipMcp < 0.50;
}

function getGestureMetrics(lm) {
    const scale = getPalmScale(lm);

    const indexOpen  = isFingerExtended(lm, 8, 6, 5);
    const middleOpen = isFingerExtended(lm, 12, 10, 9);
    const ringOpen   = isFingerExtended(lm, 16, 14, 13);
    const pinkyOpen  = isFingerExtended(lm, 20, 18, 17);

    const indexCurled  = isFingerCurled(lm, 8, 6, 5);
    const middleCurled = isFingerCurled(lm, 12, 10, 9);
    const ringCurled   = isFingerCurled(lm, 16, 14, 13);
    const pinkyCurled  = isFingerCurled(lm, 20, 18, 17);

    const extendedCount = [indexOpen, middleOpen, ringOpen, pinkyOpen].filter(Boolean).length;
    const curledCount   = [indexCurled, middleCurled, ringCurled, pinkyCurled].filter(Boolean).length;

    const pinchNorm = lmDist(lm[4], lm[8]) / scale;
    const spreadNorm =
        (lmDist(lm[8], lm[12]) + lmDist(lm[12], lm[16]) + lmDist(lm[16], lm[20])) / (3 * scale);

    const avgTipPalm =
        (lmDist(lm[8], lm[9]) + lmDist(lm[12], lm[9]) + lmDist(lm[16], lm[9]) + lmDist(lm[20], lm[9])) / (4 * scale);

    return {
        scale,
        extendedCount,
        curledCount,
        pinchNorm,
        spreadNorm,
        avgTipPalm
    };
}

function findNearestPhoto(targetWorld) {
    let best = null;
    let bestScore = Infinity;

    photoPlanes.forEach((plane) => {
        if (plane.scale.x < 0.12) return;

        let score = plane.position.distanceTo(targetWorld);

        if (plane === activePhoto) score *= 0.82;

        if (score < bestScore) {
            bestScore = score;
            best = plane;
        }
    });

    return bestScore < 26 ? best : activePhoto;
}
function solveGesture(lm) {
    const g = getGestureMetrics(lm);

    const scores = {
        TREE: 0,
        SCATTER: 0,
        FOCUS: 0
    };
        // FOCUS: pinch
    if (g.pinchNorm < 0.31) scores.FOCUS += 2.0;
    if (g.pinchNorm < 0.36) scores.FOCUS += 0.8;

    // SCATTER: open hand
    if (g.extendedCount >= 4) scores.SCATTER += 1.8;
    if (g.spreadNorm > 0.60) scores.SCATTER += 0.8;
    if (g.avgTipPalm > 1.12) scores.SCATTER += 0.7;
    if (g.pinchNorm > 0.42) scores.SCATTER += 0.2;

    // TREE: fist / curled hand
    if (g.curledCount >= 4) scores.TREE += 1.8;
    if (g.avgTipPalm < 0.86) scores.TREE += 0.9;
    if (g.spreadNorm < 0.45) scores.TREE += 0.5;

    // hysteresis
    scores[stableGesture] += 0.18;

    gestureConfidence.TREE    = gestureConfidence.TREE * 0.72 + scores.TREE * 0.28;
    gestureConfidence.SCATTER = gestureConfidence.SCATTER * 0.72 + scores.SCATTER * 0.28;
    gestureConfidence.FOCUS   = gestureConfidence.FOCUS * 0.72 + scores.FOCUS * 0.28;

    const ranked = Object.entries(gestureConfidence).sort((a, b) => b[1] - a[1]);

    if (ranked[0][1] - ranked[1][1] < 0.08) {
        return stableGesture;
    }

    stableGesture = ranked[0][0];
    return stableGesture;
}

// ==================== 9. 主循环 ====================
function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;

    if (handLandmarker && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        const results = handLandmarker.detectForVideo(video, performance.now());

        if (results.landmarks && results.landmarks[0]) {
            const rawLm = results.landmarks[0];
            const lm = smoothLandmarks(rawLm, 0.40);

            appState = solveGesture(lm);
            document.getElementById('state-txt').innerText = appState;

            tempPalmTarget.set(
                (0.5 - lm[9].x) * 45,
                (0.5 - lm[9].y) * 35,
                10
            );

            const pinchMidX = (lm[4].x + lm[8].x) * 0.5;
            const pinchMidY = (lm[4].y + lm[8].y) * 0.5;

            tempPinchTarget.set(
                (0.5 - pinchMidX) * 45,
                (0.5 - pinchMidY) * 35,
                10
            );

            const desiredTarget = appState === STATE.FOCUS ? tempPinchTarget : tempPalmTarget;
            const followAlpha =
                appState === STATE.FOCUS ? 0.46 :
                appState === STATE.SCATTER ? 0.24 :
                0.20;

            lastHandPos.lerp(desiredTarget, followAlpha);

            if (appState === STATE.SCATTER) {
                const handX = THREE.MathUtils.clamp((0.5 - lm[9].x) / 0.42, -1, 1);
                orbitAngleTarget = handX * 1.15;
            }
        }
    }

    const target = {
        premium:  appState === STATE.TREE ? 4.1  : (appState === STATE.SCATTER ? 1.34 : 0.74),
        rim:      appState === STATE.TREE ? 2.85 : (appState === STATE.SCATTER ? 1.08 : 0.46),
        star:     appState === STATE.TREE ? 108  : (appState === STATE.SCATTER ? 72   : 50),
        hemi:     appState === STATE.TREE ? 0.78 : (appState === STATE.SCATTER ? 0.46 : 0.3),
        side:     appState === STATE.TREE ? 1.52 : (appState === STATE.SCATTER ? 0.62 : 0.34),
        warmWash: appState === STATE.TREE ? 1.62 : (appState === STATE.SCATTER ? 0.88 : 0.48),
        backGold: appState === STATE.TREE ? 1.16 : (appState === STATE.SCATTER ? 0.66 : 0.36),
        bloom:    appState === STATE.TREE ? 1.68 : (appState === STATE.SCATTER ? 1.16 : 0.84),
        exposure: appState === STATE.TREE ? 1.08 : (appState === STATE.SCATTER ? 1.03 : 0.99),
        halo:     appState === STATE.TREE ? 0.62 : (appState === STATE.SCATTER ? 0.48 : 0.36)
    };

    premiumLight.intensity       += (target.premium  - premiumLight.intensity)       * 0.12;
    rimLight.intensity           += (target.rim      - rimLight.intensity)           * 0.12;
    starLight.intensity          += (target.star     - starLight.intensity)          * 0.12;
    hemiLight.intensity          += (target.hemi     - hemiLight.intensity)          * 0.12;
    sideFill.intensity           += (target.side     - sideFill.intensity)           * 0.12;
    warmWash.intensity           += (target.warmWash - warmWash.intensity)           * 0.12;
    backGold.intensity           += (target.backGold - backGold.intensity)           * 0.12;
    bloomPass.strength           += (target.bloom    - bloomPass.strength)           * 0.12;
    renderer.toneMappingExposure += (target.exposure - renderer.toneMappingExposure) * 0.08;
    treeHalo.material.opacity    += (target.halo     - treeHalo.material.opacity)    * 0.08;

    // 参考 tree_merry2 的丝滑感，保留 tree_mc 的跟手逻辑
    tempScatterTargetOffset.set(lastHandPos.x * 0.48, lastHandPos.y * 0.28, 0);
    scatterHandOffset.lerp(
        appState === STATE.SCATTER ? tempScatterTargetOffset : tempZeroVec.set(0, 0, 0),
        appState === STATE.SCATTER ? 0.14 : 0.10
    );

    if (appState === STATE.SCATTER) {
        controls.enabled = false;
        orbitAngleCurrent = THREE.MathUtils.lerp(orbitAngleCurrent, orbitAngleTarget, 0.08);

        tempCamTargetPos.set(
            Math.sin(orbitAngleCurrent) * orbitBaseRadius,
            orbitBaseHeight + Math.sin(time * 0.8) * 0.5,
            Math.cos(orbitAngleCurrent) * orbitBaseRadius
        );

        camera.position.lerp(tempCamTargetPos, 0.10);
        controls.target.lerp(orbitLookAt, 0.12);
        camera.lookAt(controls.target);
    } else {
        controls.enabled = true;
        orbitAngleTarget *= 0.90;
        orbitAngleCurrent = THREE.MathUtils.lerp(orbitAngleCurrent, 0, 0.06);
        camera.position.lerp(defaultCameraPos, 0.06);
        controls.target.lerp(orbitLookAt, 0.08);
    }

    treeElements.forEach((mesh, idx) => {
        const isScatter = appState === STATE.SCATTER;
        const isFocus = appState === STATE.FOCUS;

        if (isScatter) {
            tempLocalFloat.set(
                Math.sin(time * 1.1 + idx * 0.17) * 0.28,
                Math.cos(time * 1.25 + idx * 0.11) * 0.22,
                Math.sin(time * 0.9 + idx * 0.19) * 0.20
            );

            tempTargetPos.copy(mesh.userData.scatterPos)
                .add(scatterHandOffset)
                .add(tempLocalFloat);
        } else if (isFocus) {
            tempTargetPos.copy(mesh.userData.scatterPos);
        } else {
            tempTargetPos.copy(mesh.userData.treePos);
        }

        mesh.position.lerp(tempTargetPos, isScatter ? 0.12 : 0.08);

        if (isScatter || isFocus) {
            mesh.rotation.x += 0.02;
            mesh.rotation.y += 0.02;
        } else {
            mesh.rotation.x += (mesh.userData.rot.x - mesh.rotation.x) * 0.12;
            mesh.rotation.y += (mesh.userData.rot.y - mesh.rotation.y) * 0.12;
            mesh.rotation.z += (mesh.userData.rot.z - mesh.rotation.z) * 0.12;
            mesh.position.y += Math.sin(time * 1.5 + mesh.userData.floatSeed + idx * 0.01) * 0.0035;
        }

        mesh.rotation.y += mesh.userData.twirl * 0.14;

        mesh.children.forEach((child, cidx) => {
            if (child.type === 'Group') {
                if (child.userData.baseRotZ === undefined) {
                    child.userData.baseRotZ = child.rotation.z;
                }
                child.rotation.z = child.userData.baseRotZ + Math.sin(time * 1.6 + idx * 0.13 + cidx) * 0.03;
            }
        });
    });

    if (appState === STATE.FOCUS) {
        const nearestFocusPhoto = findNearestPhoto(lastHandPos);
        if (!activePhoto) {
            activePhoto = nearestFocusPhoto;
        } else if (nearestFocusPhoto && nearestFocusPhoto !== activePhoto) {
            const activeDist = activePhoto.position.distanceTo(lastHandPos);
            const newDist = nearestFocusPhoto.position.distanceTo(lastHandPos);
            if (newDist + 3 < activeDist) {
                activePhoto = nearestFocusPhoto;
            }
        }
    }

    photoPlanes.forEach((plane, idx) => {
        if (appState === STATE.SCATTER) {
            const angleOffset = (idx / Math.max(photoPlanes.length, 1)) * Math.PI * 2;
            const timeRot = time * 0.35 + orbitAngleCurrent * 0.8;
            const r = 26;

            tempPhotoScatterPos.set(
                Math.cos(angleOffset + timeRot) * r + scatterHandOffset.x * 0.92,
                Math.sin(time * 0.9 + idx * 0.8) * 5 + 5 + scatterHandOffset.y * 0.18,
                Math.sin(angleOffset + timeRot) * r
            );

            plane.userData.scatterPos.copy(tempPhotoScatterPos);
            plane.position.lerp(plane.userData.scatterPos, 0.09);
            plane.scale.lerp(tempTargetPos.set(1.06, 1.06, 1.06), 0.10);
            plane.material.opacity += (0.95 - plane.material.opacity) * 0.10;
            plane.lookAt(camera.position);

        } else if (appState === STATE.FOCUS) {
            if (plane === activePhoto) {
                plane.position.lerp(lastHandPos, 0.32);
                plane.scale.lerp(tempTargetPos.set(2.35, 2.35, 2.35), 0.18);
                plane.material.opacity = 1.0;
                plane.lookAt(camera.position);
            } else {
                plane.material.opacity *= 0.92;
            }

        } else {
            plane.position.lerp(plane.userData.originPos, 0.12);
            plane.scale.lerp(tempTargetPos.set(0.01, 0.01, 0.01), 0.20);
            plane.material.opacity *= 0.8;
            if (plane === activePhoto) activePhoto = null;
        }
    });

    tempDustTargetPos.copy(
        appState === STATE.SCATTER
            ? tempTargetPos.set(scatterHandOffset.x * 0.18, 1 + scatterHandOffset.y * 0.08, 0)
            : tempTargetPos.set(0, 1, 0)
    );
    goldDust.position.lerp(tempDustTargetPos, 0.08);

    const starPulse = 1 + Math.sin(time * 2.08) * 0.045;
    const starBreath = 1 + Math.sin(time * 1.2 + 0.7) * 0.03;
    const haloPulse = 1 + Math.sin(time * 1.8) * 0.08;

    star.material.emissiveIntensity = 0.9 + Math.sin(time * 2.0) * 0.07;
    starCoreAura.scale.set(5.4 * starPulse, 5.4 * starPulse, 1);
    starCoreAura.material.opacity = 0.50 + Math.sin(time * 2.2) * 0.04;
    starAura.scale.set(12.6 * starBreath, 12.6 * starBreath, 1);
    starAura.material.opacity = 0.24 + Math.sin(time * 1.8) * 0.025;

    christmasTextGroup.position.y = 22 + Math.sin(time * 1.3) * 0.18;
    christmasTextGlow.scale.set(29.2 * haloPulse, 7.1 * haloPulse, 1);
    christmasTextGlow.material.opacity = 0.12 + Math.sin(time * 2.0) * 0.018;

    treeHalo.scale.set(
        38 * (0.98 + Math.sin(time * 0.9) * 0.02),
        30 * (0.98 + Math.sin(time * 0.9) * 0.02),
        1
    );

    goldDust.rotation.y += 0.0018;
    star.rotation.y += 0.05;

    if (controls.enabled) {
        controls.update();
    }

    composer.render();
}

initMP();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
